services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    restart: always
    env_file:
      - ./backend/.docker-envs/.env.prod
    volumes:
      - /mnt/sweetlatex_db/postgres:/var/lib/postgresql/data
      - postgres_backups:/backups
    networks:
      - mynet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - mynet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: ./backend
    container_name: api
    command: gunicorn -c gunicorn_config.py sweetlatexBE.wsgi
    restart: always
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.prod
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      # ML artefact volumes — persisted across container rebuilds
      - faiss_index:/app/faiss_index
      - ml_models:/app/ml_models
    networks:
      - mynet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Default Celery worker — email, Stripe webhooks, stock release ─────────
  celery:
    build: ./backend
    command: celery -A sweetlatexBE worker -l INFO -Q celery -c 4
    container_name: celery
    restart: always
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.prod
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - postgres_backups:/backups
      - ./secrets/backup_deploy_key:/run/secrets/backup_key:ro
    networks:
      - mynet

  # ── ML Celery worker — CLIP, FAISS, BPR, SASRec, RAG indexing ────────────
  # Isolated on the `ml` queue. Concurrency 2 on prod (more RAM available).
  # mem_limit prevents a runaway CLIP/SASRec job from OOM-killing the host.
  celery_ml:
    build: ./backend
    command: celery -A sweetlatexBE worker -l INFO -Q ml -c 2
    container_name: celery_ml
    restart: always
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.prod
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - faiss_index:/app/faiss_index
      - ml_models:/app/ml_models
    networks:
      - mynet
    mem_limit: 6g
    memswap_limit: 6g

  celery_beat:
    build: ./backend
    command: >
      celery -A sweetlatexBE beat -l INFO
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    container_name: celery_beat
    restart: always
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.prod
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - postgres_backups:/backups
    networks:
      - mynet

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    container_name: frontend
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mynet
    volumes:
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    networks:
      - mynet

volumes:
  postgres_backups:
  static_files:
  media_files:
  caddy_data:
  caddy_config:
  # NEW: persisted ML artefact volumes
  faiss_index: # FAISS ANN index rebuilt nightly by Celery Beat
  ml_models: # BPR (.pkl) and SASRec (.pt) checkpoints

networks:
  mynet:
    driver: bridge
