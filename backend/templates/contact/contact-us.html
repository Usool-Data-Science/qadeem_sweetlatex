<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{{ subject }}</title>
    </head>
    <body style="margin:0;
                 padding:0;
                 background-color:#f4f6f8;
                 font-family: Arial, sans-serif">
        <table width="100%"
               cellpadding="0"
               cellspacing="0"
               style="background-color:#f4f6f8;
                      padding:20px 0">
            <tr>
                <td align="center">
                    <!-- Main container -->
                    <table width="600"
                           cellpadding="0"
                           cellspacing="0"
                           style="background:#ffffff;
                                  border-radius:8px;
                                  overflow:hidden;
                                  box-shadow:0 2px 8px rgba(0,0,0,0.05)">
                        <!-- Header -->
                        <tr>
                            <td style="background:#111827; color:#ffffff; padding:20px;">
                                <h2 style="margin:0; font-size:20px;">SweetLatex</h2>
                            </td>
                        </tr>
                        <!-- Body -->
                        <tr>
                            <td style="padding:24px; color:#333333; line-height:1.6;">
                                <h3 style="margin-top:0; font-size:18px;">New Contact Request</h3>
                                <p style="margin:0 0 16px;">A new user has reached out through your platform.</p>
                                <p style="margin:0 0 16px;">{{ body }}</p>
                                <!-- Highlight box -->
                                <table width="100%"
                                       cellpadding="0"
                                       cellspacing="0"
                                       style="background:#f9fafb;
                                              border:1px solid #e5e7eb;
                                              border-radius:6px;
                                              padding:12px">
                                    <tr>
                                        <td style="font-size:14px; color:#555;">
                                            <strong>User Email:</strong>
                                            <br>
                                            <a href="mailto:{{ sender_email }}"
                                               style="color:#2563eb;
                                                      text-decoration:none">{{ sender_email }}</a>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        <!-- Footer -->
                        <tr>
                            <td style="padding:16px;
                                       text-align:center;
                                       font-size:12px;
                                       color:#888888;
                                       background:#f9fafb">© {{ year }} SweetLatex. All rights reserved.</td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
