# ── Upstream: Django backend ──────────────────────────────────────────────────
upstream backend_servers {
    server api:8000;
}

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    include mime.types;
    client_max_body_size 10M;

    # ── Django Admin ───────────────────────────────────────────────────────────
    # ^~ prefix: Nginx stops searching for a more specific match and proxies
    # immediately. Without this, the `/` try_files block captures the request
    # first and serves index.html (the React SPA) instead of the admin.
    location ^~ /sweet-administration/ {
        proxy_pass http://backend_servers;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Required for Django admin CSRF to work through the proxy
        proxy_set_header X-CSRFToken       $cookie_csrftoken;
    }

    # ── Django REST API ────────────────────────────────────────────────────────
    location ^~ /api/ {
        proxy_pass http://backend_servers;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # SSE streaming — disable proxy buffering so chatbot tokens arrive
        # at the browser in real time rather than being held until response ends
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  300s;
    }

    # ── Django static files (admin CSS, DRF browsable API) ────────────────────
    # These are served directly by Nginx from the shared Docker volume.
    # ^~ ensures this matches before the SPA catch-all below.
    location ^~ /static/ {
        alias   /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── User-uploaded media files ──────────────────────────────────────────────
    location ^~ /media/ {
        alias   /app/media/;
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── React SPA catch-all ────────────────────────────────────────────────────
    # Must come LAST. Serves index.html for all other routes so React Router
    # handles client-side navigation.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
    }
}