# ----------------------------
# Upstream (Django backend)
# ----------------------------
upstream backend_servers {
    server api:8000;
}

# ----------------------------
# Main frontend + API server
# ----------------------------
server {
    listen 80;
    server_name localhost;

    include mime.types;

    client_max_body_size 10M;

    # ----------------------------
    # React frontend (SPA)
    # ----------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ----------------------------
    # API (Django REST / Djoser)
    # ----------------------------
    location /api/ {
        proxy_pass http://backend_servers;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # ----------------------------
    # Django Admin
    # IMPORTANT: matches your Django URL:
    # path("sweet-administration/", admin.site.urls)
    # ----------------------------
    location /sweet-administration/ {
        proxy_pass http://backend_servers;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----------------------------
    # Static files (Django collectstatic)
    # ----------------------------
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public";
    }

    # ----------------------------
    # Media files (uploads)
    # ----------------------------
    location /media/ {
        alias /app/media/;
        expires 1y;
        add_header Cache-Control "public";
    }

    # ----------------------------
    # Custom 404
    # ----------------------------
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
    }
}

# ----------------------------
# Optional: admin subdomain redirect
# ----------------------------
server {
    listen 80;
    server_name admin.localhost;

    return 301 http://localhost/sweet-administration/;
}