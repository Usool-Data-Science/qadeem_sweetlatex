services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    restart: always
    env_file:
      - ./backend/.docker-envs/.env.dev
    volumes:
      - /mnt/sweetlatex_db/postgres:/var/lib/postgresql/data
      - postgres_backups:/backups
    networks:
      - mynet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    # Limit Redis to 256 MB — prevents runaway memory if Celery queues back up
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - mynet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: ./backend
    container_name: api
    command: gunicorn -c gunicorn_config.py sweetlatexBE.wsgi
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.dev
    volumes:
      - sqlite_data:/app/sqlite
      - static_files:/app/staticfiles
      - media_files:/app/media
      # ML artefact volumes — persisted across container rebuilds
      - faiss_index:/app/faiss_index
      - ml_models:/app/ml_models
    networks:
      - mynet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Default Celery worker — handles non-ML tasks (email, Stripe, stock) ──
  celery:
    build: ./backend
    command: celery -A sweetlatexBE worker -l INFO -Q celery -c 4
    container_name: celery
    restart: always
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.dev
    volumes:
      - sqlite_data:/app/sqlite
      - static_files:/app/staticfiles
      - media_files:/app/media
      - postgres_backups:/backups
      - ./secrets/backup_deploy_key:/run/secrets/backup_key:ro
    networks:
      - mynet

  # ── ML Celery worker — handles CLIP embedding, FAISS rebuild, BPR/SASRec ──
  # Runs on a dedicated queue so heavy ML jobs never block email/Stripe tasks.
  # Concurrency 1 keeps memory predictable on dev machines.
  celery_ml:
    build: ./backend
    command: celery -A sweetlatexBE worker -l INFO -Q ml -c 1
    container_name: celery_ml
    restart: always
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.dev
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - sqlite_data:/app/sqlite
      - postgres_backups:/backups
      # ML worker needs read/write access to the same artefact volumes
      - faiss_index:/app/faiss_index
      - ml_models:/app/ml_models
    networks:
      - mynet
    # Soft memory limit — container is restarted if ML job leaks memory
    mem_limit: 4g
    memswap_limit: 4g

  celery_beat:
    build: ./backend
    command: >
      celery -A sweetlatexBE beat -l INFO
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    container_name: celery_beat
    restart: always
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.docker-envs/.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=sweetlatexBE.settings.dev
    volumes:
      - sqlite_data:/app/sqlite
      - static_files:/app/staticfiles
      - media_files:/app/media
      - postgres_backups:/backups
    networks:
      - mynet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.stagging
    restart: unless-stopped
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mynet
    volumes:
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro

volumes:
  postgres_backups:
  static_files:
  media_files:
  sqlite_data:
  # NEW: persisted ML artefact volumes
  faiss_index: # FAISS ANN index for visual similarity search
  ml_models: # BPR and SASRec checkpoints

networks:
  mynet:
    driver: bridge
